# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  # Use GitHub flavored markdown, including triple backtick fenced code blocks
  input: GFM
  # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    # Use existing pygments syntax highlighting css
    css_class: 'highlight'

# Permalinks
permalink:        pretty

# Setup
title:            Rex's Blog
tagline:          'Welcome'
description:      Not sure what I will end up writing; but let's see
url:              rexliu.me
baseurl:          /

author:
  name:           'Rex Liu'
  url:            rexliu.me

paginate:         5

# Custom vars
version:          2.1.0

github:
  repo:           https://github.com/rex911


gems:
  - jekyll-paginate
  - jekyll-gist
  - pygments.rb
  - kramdown
